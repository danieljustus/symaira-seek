name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Import signing certificate
        id: signing
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${CERTIFICATE_P12:-}" ]; then
            echo "::warning::CERTIFICATE_P12 secret is not set. Building unsigned."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "signed=true" >> "$GITHUB_OUTPUT"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo -n "$CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          # Extract identity name for GoReleaser post-hook
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Build macOS GUI and Package DMG
        run: |
          # 1. Build Swift executable for arm64 and x86_64
          swift build -c release --package-path client --arch arm64
          swift build -c release --package-path client --arch x86_64
          
          # 2. Merge Swift executables into a Universal binary
          mkdir -p client/build/bin
          lipo -create \
            client/.build/arm64-apple-macosx/release/symseek-gui \
            client/.build/x86_64-apple-macosx/release/symseek-gui \
            -output client/build/bin/symseek-gui
            
          # 3. Merge Go binaries into a Universal binary
          # GoReleaser v2 places binaries under dist/symseek_<os>_<arch>_<variant>/symseek.
          # Discover the exact paths so the step survives future variant suffix changes.
          AMD64_BIN=$(find dist -type f -path 'dist/symseek_darwin_amd64_*/symseek' | head -n 1)
          ARM64_BIN=$(find dist -type f -path 'dist/symseek_darwin_arm64_*/symseek' | head -n 1)
          if [ -z "$AMD64_BIN" ] || [ -z "$ARM64_BIN" ]; then
            echo "Could not locate GoReleaser darwin binaries in dist/"
            exit 1
          fi
          lipo -create \
            "$AMD64_BIN" \
            "$ARM64_BIN" \
            -output client/build/bin/symseek
            
          # 4. Assemble the App Bundle
          APP_DIR="client/build/Symseek.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp client/Sources/SymseekApp/Info.plist "$APP_DIR/Contents/"
          cp client/build/bin/symseek-gui "$APP_DIR/Contents/MacOS/"
          cp client/build/bin/symseek "$APP_DIR/Contents/Resources/"
          chmod +x "$APP_DIR/Contents/Resources/symseek"
          
          # 5. Codesign the App Bundle if CODESIGN_IDENTITY is available
          if [ -n "${CODESIGN_IDENTITY:-}" ]; then
            echo "Codesigning Symseek.app with $CODESIGN_IDENTITY..."
            codesign --force --options runtime --deep --sign "$CODESIGN_IDENTITY" --timestamp "$APP_DIR"
          else
            echo "Signing identity not found. Packaging unsigned app."
          fi
          
          # 6. Package into DMG
          DMG_STAGE="client/build/dmg"
          mkdir -p "$DMG_STAGE"
          cp -R "$APP_DIR" "$DMG_STAGE/"
          ln -s /Applications "$DMG_STAGE/Applications"
          hdiutil create -volname "Symseek" -srcfolder "$DMG_STAGE" -ov -format UDZO client/build/Symseek.dmg

      - name: Notarize macOS DMG
        if: steps.signing.outputs.signed == 'true'
        env:
          NOTARY_API_KEY: ${{ secrets.NOTARY_API_KEY }}
          NOTARY_API_ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
        run: |
          if [ -z "${NOTARY_API_KEY:-}" ]; then
            echo "::warning::NOTARY_API_KEY secret is not set. Skipping notarization."
            exit 0
          fi
          echo "Notarizing Symseek.dmg..."
          xcrun notarytool submit client/build/Symseek.dmg \
            --apple-id "${NOTARY_API_KEY_ID}" \
            --team-id "${NOTARY_API_ISSUER}" \
            --password "${NOTARY_API_KEY}" \
            --wait
          
          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple client/build/Symseek.dmg

      - name: Upload DMG to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Uploading Symseek.dmg to release ${GITHUB_REF_NAME}..."
          gh release upload "${GITHUB_REF_NAME}" client/build/Symseek.dmg --clobber

      - name: Clean up signing material
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
