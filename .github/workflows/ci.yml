name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build
        run: |
          if [ -n "$GITHUB_REF_NAME" ] && git describe --tags --exact-match >/dev/null 2>&1; then
            VERSION="$(git describe --tags --exact-match)"
          elif [ -n "$GITHUB_SHA" ]; then
            SHORT_SHA="${GITHUB_SHA:0:7}"
            VERSION="0.0.0-dev+${SHORT_SHA}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "Injecting version: ${VERSION}"
          go build -ldflags "-s -w -X main.version=${VERSION}" ./...

      - name: Test
        run: go test -race ./...
