<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="420" fill="#ffffff" rx="0"/>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Symaira-Seek Architecture</text>
  <line x1="60" y1="40" x2="860" y2="40" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ==================== INTERFACES ==================== -->
  <text x="80" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8" letter-spacing="1.5">INTERFACES</text>

  <!-- CLI -->
  <rect x="18" y="72" width="124" height="34" rx="6" fill="#1e40af"/>
  <text x="80" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">CLI</text>

  <!-- MCP Server -->
  <rect x="18" y="118" width="124" height="34" rx="6" fill="#1e40af"/>
  <text x="80" y="140" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">MCP Server</text>

  <!-- HTTP REST -->
  <rect x="18" y="164" width="124" height="34" rx="6" fill="#1e40af"/>
  <text x="80" y="186" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">HTTP REST</text>

  <!-- Vertical bracket connecting interfaces -->
  <line x1="148" y1="89" x2="148" y2="181" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="148" y1="89" x2="156" y2="89" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="148" y1="181" x2="156" y2="181" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Bracket midpoint -->
  <circle cx="148" cy="135" r="2.5" fill="#94a3b8"/>

  <!-- Arrow: interfaces → Parser (ingestion path) -->
  <path d="M156,89 L180,89 L180,137 L220,137" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <text x="186" y="80" font-size="8" fill="#94a3b8" font-weight="500">index</text>

  <!-- Arrow: interfaces → Search Query (search path) -->
  <path d="M156,181 L180,181 L180,340 L215,340" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <text x="186" y="196" font-size="8" fill="#94a3b8" font-weight="500">search</text>

  <!-- ==================== INGESTION FLOW (top) ==================== -->
  <text x="400" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8" letter-spacing="1.5">INGESTION</text>

  <!-- Documents label -->
  <text x="220" y="118" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">documents</text>

  <!-- Parser/Chunker -->
  <rect x="220" y="122" width="120" height="42" rx="7" fill="#7c3aed"/>
  <text x="280" y="141" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Parser</text>
  <text x="280" y="155" text-anchor="middle" font-size="9" fill="#ddd6fe">/Chunker</text>

  <!-- Embedder -->
  <rect x="390" y="122" width="130" height="42" rx="7" fill="#b45309"/>
  <text x="455" y="141" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Embedder</text>
  <text x="455" y="155" text-anchor="middle" font-size="8.5" fill="#fde68a">Ollama / Fallback</text>

  <!-- Parser → Embedder -->
  <line x1="340" y1="143" x2="390" y2="143" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ==================== STORAGE ==================== -->
  <text x="675" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8" letter-spacing="1.5">STORAGE</text>

  <!-- SQLite container -->
  <rect x="575" y="72" width="200" height="178" rx="9" fill="#f0fdf4" stroke="#047857" stroke-width="1.5"/>
  <text x="675" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">SQLite</text>
  <text x="675" y="108" text-anchor="middle" font-size="8" fill="#059669">pure-Go · WAL mode · 100% CGO-free</text>

  <!-- FTS5 BM25 -->
  <rect x="588" y="118" width="174" height="48" rx="5" fill="#0891b2"/>
  <text x="675" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">FTS5 · BM25</text>
  <text x="675" y="155" text-anchor="middle" font-size="8.5" fill="#cffafe">Keyword Search</text>

  <!-- Vector Embeddings -->
  <rect x="588" y="176" width="174" height="48" rx="5" fill="#2563eb"/>
  <text x="675" y="197" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Vector Embeddings</text>
  <text x="675" y="213" text-anchor="middle" font-size="8.5" fill="#bfdbfe">768-d · Cosine Similarity</text>

  <!-- Embedder → SQLite -->
  <line x1="520" y1="143" x2="575" y2="143" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ==================== SEARCH FLOW (bottom) ==================== -->
  <text x="450" y="270" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8" letter-spacing="1.5">SEARCH</text>

  <!-- Search Query input -->
  <rect x="215" y="323" width="110" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="270" y="345" text-anchor="middle" font-size="11" font-weight="500" fill="#334155">Search Query</text>

  <!-- Hybrid Search -->
  <rect x="380" y="318" width="150" height="42" rx="7" fill="#6d28d9"/>
  <text x="455" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Hybrid Search</text>

  <!-- Search Query → Hybrid Search -->
  <line x1="325" y1="340" x2="380" y2="339" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- RRF -->
  <rect x="580" y="318" width="95" height="42" rx="7" fill="#dc2626"/>
  <text x="627" y="337" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">RRF</text>
  <text x="627" y="352" text-anchor="middle" font-size="8.5" fill="#fecaca">k = 60</text>

  <!-- Hybrid Search → RRF -->
  <line x1="530" y1="339" x2="580" y2="339" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Results -->
  <rect x="725" y="318" width="100" height="42" rx="7" fill="#15803d"/>
  <text x="775" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Results</text>

  <!-- RRF → Results -->
  <line x1="675" y1="339" x2="725" y2="339" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ==================== CROSS-FLOW CONNECTION ==================== -->
  <!-- SQLite → Hybrid Search (vertical dashed arrow) -->
  <path d="M675,250 L675,290 L455,290 L455,318" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#ah)" stroke-dasharray="6,3"/>

  <!-- Label on the cross-flow connection -->
  <rect x="515" y="282" width="118" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="574" y="294" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">FTS5 + Vector query</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="18" y="385" width="884" height="28" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.75"/>

  <!-- Legend items -->
  <rect x="30" y="393" width="12" height="12" rx="2" fill="#1e40af"/>
  <text x="48" y="403" font-size="8.5" fill="#475569">Interface</text>

  <rect x="120" y="393" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="138" y="403" font-size="8.5" fill="#475569">Parse / Chunk</text>

  <rect x="232" y="393" width="12" height="12" rx="2" fill="#b45309"/>
  <text x="250" y="403" font-size="8.5" fill="#475569">Embed</text>

  <rect x="310" y="393" width="12" height="12" rx="2" fill="#0891b2"/>
  <text x="328" y="403" font-size="8.5" fill="#475569">FTS5</text>

  <rect x="380" y="393" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="398" y="403" font-size="8.5" fill="#475569">Vector</text>

  <rect x="455" y="393" width="12" height="12" rx="2" fill="#6d28d9"/>
  <text x="473" y="403" font-size="8.5" fill="#475569">Search</text>

  <rect x="530" y="393" width="12" height="12" rx="2" fill="#dc2626"/>
  <text x="548" y="403" font-size="8.5" fill="#475569">Fusion</text>

  <rect x="598" y="393" width="12" height="12" rx="2" fill="#15803d"/>
  <text x="616" y="403" font-size="8.5" fill="#475569">Output</text>

  <!-- Solid vs dashed line legend -->
  <line x1="680" y1="399" x2="710" y2="399" stroke="#475569" stroke-width="1.5"/>
  <text x="716" y="403" font-size="8.5" fill="#475569">Data flow</text>

  <line x1="780" y1="399" x2="810" y2="399" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="816" y="403" font-size="8.5" fill="#475569">Query path</text>

</svg>
